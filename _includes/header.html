<header class="header" data-dark="">
  <div class="header__geometrics">
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <linearGradient id="hub-geometric-header-gradient" x1=".182" x2=".174" y1=".579" y2=".706" gradientUnits="objectBoundingBox">
          <stop offset="0" stop-color="var(--sky-blue)"></stop>
          <stop offset="1" stop-color="var(--sky-blue)" stop-opacity="0"></stop>
        </linearGradient>
      </defs>
    </svg>
    <svg class="sprite sprite--hub-geometric" aria-hidden="true" viewBox="0 0 719.5 718.4"><use xlink:href="#hub-geometric"></use></svg>    <svg class="sprite sprite--hub-geometric" aria-hidden="true" viewBox="0 0 719.5 718.4"><use xlink:href="#hub-geometric"></use></svg>  </div>
  <div class="header__inner">
    <div class="header__dogear" data-light="">
      <div class="region region--branding">
        <div class="block block--system-branding-block">
          <a href="{{ "/" | relative_url }}">
            <svg class="sprite sprite--wc-mark" aria-hidden="true" viewBox="0 0 229 72"><use xlink:href="#wc-mark"></use></svg><span class="visually-hidden">Penn State World Campus</span>
          </a>
        </div>
      </div>
    </div>
    <div class="header__content">
      <div class="docs-theme-header-content">
        <div class="tagline">
          <div class="tagline__text">
            {{ site.title | default: 'World Campus <strong>Jekyll Theme</strong>' }}
          </div>
        </div>
        <div class="compact-menu">
          <div class="drop-button" data-interactive-component>
            <div role="button" class="drop-button__toggle" tabindex="0" aria-expanded="false">
              <div class="compact-menu__toggle compact-menu__toggle--vertical">
                <div class="compact-menu__toggle-sprite">
                  <svg class="sprite sprite--fa-bars" aria-hidden="true" viewBox="0 0 448 384">
                    <use xlink:href="#fa-bars" />
                  </svg>
                </div>
                <span class="compact-menu__toggle-label">Menu</span>
              </div>
            </div>
            <div class="drop-button__content drop-button__content--wide drop-button__content--padding-none" data-light tabindex="0">
              <div class="compact-menu__content">
                {% include menu.html %}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="header__overflow"></div></header>
